<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>ParaX Pro</title>
  <style>
    body {
      margin: 0;
      background: #0b0d11;
      color: #f5f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap {
      padding: 36px 42px;
    }
    .logo {
      width: 160px;
      display: block;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    p {
      margin: 0 0 10px;
      font-size: 14px;
      line-height: 1.5;
      color: #d7dce5;
      max-width: 560px;
    }
    .note {
      margin-top: 18px;
      color: #9fb0c7;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="parax-logo.png" alt="ParaX Pro">
    <h1>ParaX Pro</h1>
    <p>Instalador para macOS do plugin ParaX Pro para Adobe After Effects.</p>
    <p>O pacote instala o painel em ScriptUI Panels e registra o pseudo-effect PU | Settings nas versões detectadas do After Effects.</p>
    <p class="note">Feche o Adobe After Effects antes de continuar.</p>
  </div>
</body>
</html>
